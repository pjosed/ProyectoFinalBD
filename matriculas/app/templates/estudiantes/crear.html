{% extends 'shared/base.html' %}

{% block titulo %}Nuevo Estudiante - UniCaribe{% endblock %}

{% block contenido %}
<div class="mb-4">
    <a href="{{ url_for('estudiantes.lista_estudiantes') }}" class="text-decoration-none text-secondary">
        <i class="bi-arrow-left me-1"></i>Volver a la lista
    </a>
</div>

<div class="card mx-auto" style="max-width: 800px;">
    <div class="card-header bg-white py-3">
        <h5 class="mb-0"><i class="bi-person-plus me-2 text-primary"></i>Registrar Nuevo Estudiante</h5>
    </div>
    <div class="card-body p-4">
        <form method="POST" action="{{ url_for('estudiantes.crear_estudiante') }}">

            <div class="row g-3 mb-3">
                <div class="col-md-4">
                    <label class="form-label">Tipo Documento <span class="text-danger">*</span></label>
                    <select name="tipo_doc" class="form-select" required>
                        <option value="CC">Cédula (CC)</option>
                        <option value="TI">Tarjeta Identidad (TI)</option>
                        <option value="CE">Cédula Extranjería (CE)</option>
                        <option value="PS">Pasaporte (PS)</option>
                    </select>
                </div>
                <div class="col-md-8">
                    <label class="form-label">Número de Documento <span class="text-danger">*</span></label>
                    <input type="text" name="num_doc" class="form-control" required maxlength="20">
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label">Nombres <span class="text-danger">*</span></label>
                    <input type="text" name="nombres" class="form-control" required maxlength="100">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Apellidos <span class="text-danger">*</span></label>
                    <input type="text" name="apellidos" class="form-control" required maxlength="100">
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label">Correo Electrónico <span class="text-danger">*</span></label>
                    <input type="email" name="email" class="form-control" required maxlength="150">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Teléfono</label>
                    <input type="text" name="telefono" class="form-control" maxlength="20">
                </div>
            </div>

            <div class="text-end">
                <a href="{{ url_for('estudiantes.lista_estudiantes') }}" class="btn btn-light me-2">Cancelar</a>
                <button type="submit" class="btn btn-primary">
                    <i class="bi-save me-1"></i>Guardar Estudiante
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
