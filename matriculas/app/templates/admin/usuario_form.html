{% extends "shared/base.html" %}
{% block titulo %}Nuevo Usuario{% endblock %}

{% block contenido %}
<div class="mb-4">
    <h4 class="fw-bold"><i class="bi-person-plus me-2 text-primary"></i>Crear Nuevo Usuario</h4>
</div>

<div class="card" style="max-width:650px;">
    <div class="card-body p-4">
        <form method="POST">

            <input type="hidden" name="accion" value="nueva">

            <!-- PASO 1: Datos de la persona -->
            <h6 class="fw-semibold text-primary mb-3">1. Datos personales</h6>
            <div class="row g-3 mb-3">
                <div class="col-6">
                    <label class="form-label">Nombre <span class="text-danger">*</span></label>
                    <input type="text" name="nombre" class="form-control" placeholder="Nombre" required>
                </div>
                <div class="col-6">
                    <label class="form-label">Apellido <span class="text-danger">*</span></label>
                    <input type="text" name="apellido" class="form-control" placeholder="Apellido" required>
                </div>
                <div class="col-4">
                    <label class="form-label">Tipo doc.</label>
                    <select name="tipo_doc" class="form-select">
                        <option value="CC">CC</option>
                        <option value="CE">CE</option>
                        <option value="PASAPORTE">Pasaporte</option>
                    </select>
                </div>
                <div class="col-8">
                    <label class="form-label">Número de documento <span class="text-danger">*</span></label>
                    <input type="text" name="num_doc" class="form-control"
                           placeholder="Número de documento" required>
                </div>
                <div class="col-8">
                    <label class="form-label">Correo electrónico <span class="text-danger">*</span></label>
                    <input type="email" name="correo" class="form-control"
                           placeholder="correo@unicaribe.edu.co" required>
                </div>
                <div class="col-4">
                    <label class="form-label">Teléfono</label>
                    <input type="text" name="telefono" class="form-control" placeholder="300...">
                </div>
            </div>

            <hr class="my-4">

            <!-- PASO 2: Datos de acceso -->
            <h6 class="fw-semibold text-primary mb-3">2. Datos de acceso</h6>
            <div class="row g-3">
                <div class="col-6">
                    <label class="form-label">Nombre de usuario <span class="text-danger">*</span></label>
                    <input type="text" name="nombre_usuario" class="form-control"
                           placeholder="ej: jpeña" required
                           pattern="[a-zA-Z0-9_\.]+"
                           title="Solo letras, números, guion bajo y punto">
                    <div class="form-text">Sin espacios ni caracteres especiales.</div>
                </div>
                <div class="col-6">
                    <label class="form-label">Rol <span class="text-danger">*</span></label>
                    <select name="id_rol" class="form-select" required>
                        <option value="">— Selecciona rol —</option>
                        {% for r in roles %}
                        <option value="{{ r.id_rol }}">{{ r.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="alert alert-info mt-3 small">
                <i class="bi-info-circle me-1"></i>
                La contraseña se genera automáticamente y se envía al correo registrado.
            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi-person-check me-1"></i>Crear usuario
                </button>
                <a href="{{ url_for('admin.usuarios_lista') }}" class="btn btn-outline-secondary">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
