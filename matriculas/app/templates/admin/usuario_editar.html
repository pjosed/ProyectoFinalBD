{% extends "shared/base.html" %}
{% block titulo %}Editar Usuario{% endblock %}

{% block contenido %}
<div class="mb-4">
    <h4 class="fw-bold"><i class="bi-pencil me-2 text-primary"></i>Editar Usuario</h4>
</div>

<div class="card" style="max-width:650px;">
    <div class="card-body p-4">
        <form method="POST">

            <!-- Datos personales -->
            <h6 class="fw-semibold text-primary mb-3">Datos personales</h6>
            <div class="row g-3 mb-3">
                <div class="col-6">
                    <label class="form-label">Nombre</label>
                    <input type="text" name="nombre" class="form-control"
                           value="{{ usuario.nombre }}" required>
                </div>
                <div class="col-6">
                    <label class="form-label">Apellido</label>
                    <input type="text" name="apellido" class="form-control"
                           value="{{ usuario.apellido }}" required>
                </div>
                <div class="col-8">
                    <label class="form-label">Correo electrónico <span class="text-danger">*</span></label>
                    <input type="email" name="correo" class="form-control"
                           value="{{ usuario.correo }}" required>
                    <div class="form-text">Este correo se usa para enviar la contraseña.</div>
                </div>
                <div class="col-4">
                    <label class="form-label">Teléfono</label>
                    <input type="text" name="telefono" class="form-control"
                           value="{{ usuario.telefono or '' }}">
                </div>
            </div>

            <hr class="my-4">

            <!-- Datos de acceso -->
            <h6 class="fw-semibold text-primary mb-3">Datos de acceso</h6>
            <div class="row g-3">
                <div class="col-6">
                    <label class="form-label">Nombre de usuario</label>
                    <input type="text" class="form-control bg-light"
                           value="{{ usuario.nombre_usuario }}" disabled>
                    <div class="form-text text-muted">El nombre de usuario no se puede cambiar.</div>
                </div>
                <div class="col-6">
                    <label class="form-label">Rol <span class="text-danger">*</span></label>
                    <select name="id_rol" class="form-select" required>
                        {% for r in roles %}
                        <option value="{{ r.id_rol }}"
                            {% if r.id_rol == usuario.id_rol %}selected{% endif %}>
                            {{ r.nombre }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi-check-circle me-1"></i>Guardar cambios
                </button>
                <a href="{{ url_for('admin.usuarios_lista') }}" class="btn btn-outline-secondary">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
