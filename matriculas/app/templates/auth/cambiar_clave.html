<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña — Matrículas UniCaribe</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #0d6efd 0%, #0a3c7e 100%);
               min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card-cambio { border: none; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.25); }
    </style>
</head>
<body>
<div class="card card-cambio" style="width:400px;">
    <div class="card-body p-5">
        <div class="text-center mb-4">
            <i class="bi-shield-lock text-warning" style="font-size:2.5rem;"></i>
            <h5 class="mt-2 fw-bold">Cambio de Contraseña</h5>
            <p class="text-muted small">Debes establecer una nueva contraseña para continuar.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for categoria, mensaje in messages %}
            <div class="alert alert-{{ categoria }} py-2 small">{{ mensaje }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Nueva contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi-lock"></i></span>
                    <input type="password" name="nueva_contrasena" class="form-control"
                           placeholder="Mínimo 8 caracteres" required minlength="8">
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Confirmar contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi-lock-fill"></i></span>
                    <input type="password" name="confirmar_contrasena" class="form-control"
                           placeholder="Repite la contraseña" required minlength="8">
                </div>
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-semibold text-dark">
                <i class="bi-check-circle me-1"></i> Guardar nueva contraseña
            </button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
