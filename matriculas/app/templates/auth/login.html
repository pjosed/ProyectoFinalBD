<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Matrículas UniCaribe</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #0d6efd 0%, #0a3c7e 100%); min-height: 100vh;
               display: flex; align-items: center; justify-content: center; }
        .card-login { border: none; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.25); }
        .logo-uni { font-size: 2.5rem; color: #0d6efd; }
    </style>
</head>
<body>
<div class="card card-login" style="width: 380px;">
    <div class="card-body p-5">
        <div class="text-center mb-4">
            <i class="bi-university logo-uni"></i>
            <h5 class="mt-2 fw-bold">Matrículas UniCaribe</h5>
            <p class="text-muted small">Sistema de Gestión de Matrículas</p>
        </div>

        <!-- Mensajes Flash -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for categoria, mensaje in messages %}
            <div class="alert alert-{{ categoria }} py-2 small">{{ mensaje }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="mb-3">
                <label class="form-label fw-semibold">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi-person"></i></span>
                    <input type="text" name="nombre_usuario" class="form-control"
                           placeholder="Nombre de usuario" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi-lock"></i></span>
                    <input type="password" name="contrasena" class="form-control"
                           placeholder="Contraseña" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-semibold">
                <i class="bi-box-arrow-in-right me-1"></i> Ingresar
            </button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
