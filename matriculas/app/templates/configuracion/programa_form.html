{% extends "shared/base.html" %}
{% block titulo %}{% if programa %}Editar Programa{% else %}Nuevo Programa{% endif %}{% endblock %}

{% block contenido %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">
        <i class="bi-book me-2 text-primary"></i>
        {% if programa %}Editar Programa{% else %}Nuevo Programa{% endif %}
    </h4>
    <a href="{{ url_for('configuracion.programas_lista') }}" class="btn btn-outline-secondary">
        <i class="bi-arrow-left me-1"></i> Volver
    </a>
</div>

<div class="card" style="max-width:640px;">
    <div class="card-body">
        <form method="POST">

            <div class="row g-3 mb-3">
                <div class="col-sm-4">
                    <label class="form-label fw-semibold">Código <span class="text-danger">*</span></label>
                    <input type="text" name="codigo" class="form-control text-uppercase"
                           maxlength="20" required
                           value="{{ programa.codigo if programa else '' }}"
                           placeholder="Ej: ING-SIS-P">
                    <div class="form-text">Único, sin espacios.</div>
                </div>
                <div class="col-sm-8">
                    <label class="form-label fw-semibold">Nombre del programa <span class="text-danger">*</span></label>
                    <input type="text" name="nombre" class="form-control"
                           maxlength="150" required
                           value="{{ programa.nombre if programa else '' }}"
                           placeholder="Ej: Ingeniería de Sistemas">
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-sm-6">
                    <label class="form-label fw-semibold">Modalidad <span class="text-danger">*</span></label>
                    <select name="modalidad" class="form-select" required>
                        <option value="">— Selecciona —</option>
                        {% for m in modalidades %}
                        <option value="{{ m }}"
                            {% if programa and programa.modalidad == m %}selected{% endif %}>
                            {{ m }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-sm-6">
                    <label class="form-label fw-semibold">Nivel <span class="text-danger">*</span></label>
                    <select name="nivel" class="form-select" required>
                        <option value="">— Selecciona —</option>
                        {% for n in niveles %}
                        <option value="{{ n }}"
                            {% if programa and programa.nivel == n %}selected{% endif %}>
                            {{ n }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-sm-6">
                    <label class="form-label fw-semibold">Total de semestres <span class="text-danger">*</span></label>
                    <input type="number" name="total_semestres" class="form-control"
                           min="1" max="20" required
                           value="{{ programa.total_semestres if programa else '' }}">
                </div>
                <div class="col-sm-6">
                    <label class="form-label fw-semibold">Total de créditos <span class="text-danger">*</span></label>
                    <input type="number" name="total_creditos" class="form-control"
                           min="1" required
                           value="{{ programa.total_creditos if programa else '' }}">
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi-check-lg me-1"></i>
                    {% if programa %}Guardar cambios{% else %}Crear programa{% endif %}
                </button>
                <a href="{{ url_for('configuracion.programas_lista') }}" class="btn btn-outline-secondary">
                    Cancelar
                </a>
            </div>

        </form>
    </div>
</div>
{% endblock %}
